services:
  - type: web
    rootDirectory: .
    name: future-fs-02-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: PORT
        value: 5000
      - key: ALLOWED_ORIGIN
        value: https://future-fs-02-coral-zeta.vercel.app
