<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadSync Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: #020617;">
    <!-- LOGIN PAGE -->
    <div id="login-section" class="login-container">
        <div class="login-card glass animate">
            <h2 style="text-align: center; margin-bottom: 2rem;">Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p id="login-error" style="color: #ef4444; font-size: 0.875rem; text-align: center; margin-top: 1rem; display: none;">Invalid credentials. Please try again.</p>
        </div>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="admin-section" style="display: none;">
        <nav class="container" style="display: flex; justify-content: space-between; align-items: center; padding-top: 2rem;">
            <div class="logo" style="font-weight: 800; font-size: 1.5rem;">LEAD<span style="color: var(--primary);">SYNC</span></div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <span id="admin-name" style="color: var(--text-muted);">Admin</span>
                <button onclick="logout()" class="btn btn-glass btn-sm">Sign Out</button>
            </div>
        </nav>

        <main class="container">
            <!-- Analytics Cards -->
            <div class="stats-grid">
                <div class="stat-card glass animate" style="animation-delay: 0.1s;">
                    <h3>Total Leads</h3>
                    <p id="total-leads">0</p>
                </div>
                <div class="stat-card glass animate" style="animation-delay: 0.2s;">
                    <h3>New</h3>
                    <p id="new-leads" style="color: #3b82f6;">0</p>
                </div>
                <div class="stat-card glass animate" style="animation-delay: 0.3s;">
                    <h3>Contacted</h3>
                    <p id="contacted-leads" style="color: #f59e0b;">0</p>
                </div>
                <div class="stat-card glass animate" style="animation-delay: 0.4s;">
                    <h3>Converted</h3>
                    <p id="converted-leads" style="color: #10b981;">0</p>
                </div>
            </div>

            <!-- Leads Management -->
            <div class="leads-container glass animate" style="padding: 2rem; animation-delay: 0.5s;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Active Leads</h2>
                    <div>
                        <input type="text" id="search-input" placeholder="Search leads..." style="padding: 0.5rem; border-radius: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white;">
                    </div>
                </div>

                <div class="crm-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Contact Info</th>
                                <th>Source</th>
                                <th>Status</th>
                                <th>Notes</th>
                                <th>Created</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="leads-list">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                    <div id="loading" style="text-align: center; padding: 2rem; color: var(--text-muted);">Loading leads...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Note Modal -->
    <div id="note-modal" class="modal-overlay">
        <div class="modal-content glass animate">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Edit Lead</h2>
            <form id="edit-lead-form">
                <input type="hidden" id="edit-lead-id">
                <div class="form-group">
                    <label for="edit-status">Status</label>
                    <select id="edit-status">
                        <option value="new">New</option>
                        <option value="contacted">Contacted</option>
                        <option value="converted">Converted</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="edit-notes">Notes</label>
                    <textarea id="edit-notes" rows="6"></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                    <button type="button" onclick="toggleModal('note-modal')" class="btn btn-glass">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
